<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FNAF - Sistema de Camaras</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #c0c0c0;
      font-family: 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .monitor {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Pantalla principal de la camara */
    .camera-feed {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050505;
      overflow: hidden;
    }

    .camera-feed::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 3;
    }

    .camera-feed::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
      z-index: 4;
    }

    .camera-feed img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      z-index: 1;
      filter: brightness(0.8) contrast(1.1);
    }

    .no-signal {
      color: #444;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      z-index: 1;
      animation: flicker 3s infinite;
    }

    /* Efecto de interferencia al cambiar de camara */
    .static-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 255, 255, 0.03) 2px,
        rgba(255, 255, 255, 0.03) 4px
      );
    }

    .static-overlay.active {
      animation: staticNoise 0.4s steps(4) forwards;
    }

    @keyframes staticNoise {
      0% { opacity: 1; background-color: rgba(200, 200, 200, 0.15); }
      25% { opacity: 0.8; background-color: rgba(100, 100, 100, 0.2); }
      50% { opacity: 0.6; background-color: rgba(150, 150, 150, 0.1); }
      75% { opacity: 0.3; background-color: rgba(50, 50, 50, 0.05); }
      100% { opacity: 0; }
    }

    /* HUD superior */
    .hud-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
    }

    .camera-label {
      font-size: 1.4rem;
      color: #e0e0e0;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
    }

    .rec-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #ff3333;
    }

    .rec-dot {
      width: 10px;
      height: 10px;
      background: #ff3333;
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .timestamp {
      position: absolute;
      bottom: 90px;
      right: 20px;
      font-size: 0.85rem;
      color: #888;
      z-index: 10;
    }

    /* Panel inferior de seleccion de camaras */
    .camera-panel {
      background: linear-gradient(to top, #111 0%, #1a1a1a 100%);
      border-top: 2px solid #222;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }

    .camera-panel-label {
      color: #555;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-right: 15px;
    }

    .cam-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 10px 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.15s ease;
      position: relative;
    }

    .cam-btn:hover {
      background: #252525;
      border-color: #555;
      color: #ccc;
    }

    .cam-btn.active {
      background: #1a2a1a;
      border-color: #4a7a4a;
      color: #7fbf7f;
      box-shadow: 0 0 10px rgba(74, 122, 74, 0.3), inset 0 0 8px rgba(74, 122, 74, 0.1);
    }

    .cam-btn.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 20%;
      width: 60%;
      height: 2px;
      background: #4a7a4a;
      box-shadow: 0 0 6px #4a7a4a;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.3; }
      92% { opacity: 0.6; }
      93% { opacity: 0.2; }
      94% { opacity: 0.6; }
    }

    /* Ruido de fondo sutil */
    .noise {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div class="monitor">
    <div class="camera-feed" id="cameraFeed">
      <div class="noise"></div>
      <div class="static-overlay" id="staticOverlay"></div>

      <div class="hud-top">
        <div class="camera-label" id="cameraLabel">CAM 1A - Show Stage</div>
        <div class="rec-indicator">
          <div class="rec-dot"></div>
          REC
        </div>
      </div>

      <span class="no-signal" id="noSignal" style="display: none;">Sin senal</span>
      <img id="cameraImage" src="" alt="Camera feed" style="display: none;">

      <div class="timestamp" id="timestamp"></div>
    </div>

    <div class="camera-panel">
      <span class="camera-panel-label">Camaras</span>
      <button class="cam-btn active" data-cam="1" onclick="switchCamera(1)">CAM 1A</button>
      <button class="cam-btn" data-cam="2" onclick="switchCamera(2)">CAM 1B</button>
      <button class="cam-btn" data-cam="3" onclick="switchCamera(3)">CAM 2A</button>
      <button class="cam-btn" data-cam="4" onclick="switchCamera(4)">CAM 3</button>
      <button class="cam-btn" data-cam="5" onclick="switchCamera(5)">CAM 4A</button>
    </div>
  </div>

  <script>
    const cameras = {
      1: { label: 'CAM 1A - Show Stage',       image: 'img/cam1.jpg' },
      2: { label: 'CAM 1B - Dining Area',       image: 'img/cam2.jpg' },
      3: { label: 'CAM 2A - West Hall',         image: 'img/cam3.jpg' },
      4: { label: 'CAM 3 - Supply Closet',      image: 'img/cam4.jpg' },
      5: { label: 'CAM 4A - East Hall Corner',   image: 'img/cam5.jpg' },
    };

    let currentCam = 1;
    let cam1ClickCount = 0;

    function switchCamera(camId) {
      // Contador de clics en CAM 1A
      if (camId === 1) {
        cam1ClickCount++;
      }

      // Determinar la imagen a usar
      let imageToLoad = cameras[camId].image;
      if (camId === 1 && cam1ClickCount === 5) {
        imageToLoad = 'img/cam1B.jpg';
      }

      if (camId === currentCam && !(camId === 1 && cam1ClickCount === 5)) return;
      currentCam = camId;

      // Actualizar botones
      document.querySelectorAll('.cam-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`[data-cam="${camId}"]`).classList.add('active');

      // Efecto de interferencia
      const overlay = document.getElementById('staticOverlay');
      overlay.classList.remove('active');
      void overlay.offsetWidth; // forzar reflow
      overlay.classList.add('active');

      // Actualizar label
      document.getElementById('cameraLabel').textContent = cameras[camId].label;

      // Cargar imagen
      const img = document.getElementById('cameraImage');
      const noSignal = document.getElementById('noSignal');

      img.style.display = 'none';
      noSignal.style.display = 'none';

      const testImg = new Image();
      testImg.onload = function () {
        img.src = imageToLoad;
        img.style.display = 'block';
        noSignal.style.display = 'none';
      };
      testImg.onerror = function () {
        img.style.display = 'none';
        noSignal.style.display = 'block';
      };
      testImg.src = imageToLoad;
    }

    // Reloj en tiempo real
    function updateTimestamp() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('timestamp').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateTimestamp, 1000);
    updateTimestamp();

    // Cargar camara inicial
    switchCamera(1);
    // Restaurar boton activo ya que switchCamera ignora si es la misma
    currentCam = 0;
    switchCamera(1);
  </script>
</body>
</html>
